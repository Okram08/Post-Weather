# crypto-trading-bot configuration
# Edit and git push — the next scan picks up the new values.

strategy:
  pairs:
    - "BTC/USDT:USDT"
    - "ETH/USDT:USDT"
    - "SOL/USDT:USDT"

  setup_a:
    # Detection thresholds (on 4h bar close)
    setup_atr_extension: 1.5      # |close - vwap_24h| / atr > 1.5
    rsi_threshold: 30.0           # RSI_4h < 30 long, > 70 short
    adx_max: 25.0                 # ADX < 25 = range regime (anti-trend filter)
    funding_threshold: -0.0002    # 8h funding < -0.02% for long (symmetric for short)

    # Limit order placement (deeper than trigger → better fills)
    limit_extension_atr: 2.5

    # Risk management
    stop_atr: 1.5
    target_pct: 0.01              # +1% target

    # Time controls
    limit_validity_hours: 8       # cancel if not filled in 8h
    position_max_hours: 12        # close position at market after 12h

bankroll:
  initial_capital_usd: 10000.0
  risk_per_trade_pct: 0.01        # 1% of equity at risk per trade
  max_concurrent_positions: 3
  max_leverage: 3.0               # implied leverage cap (safety)

  # Circuit breakers — automatic halt
  daily_loss_limit_pct: 0.03      # -3% in 24h → halt for 24h
  max_drawdown_pct: 0.15          # -15% from peak → halt until manual reset

  # Sizing model
  sizing_model: fixed             # 'fixed' (use risk_per_trade_pct) or 'kelly_fraction'
  kelly_fraction: 0.25            # only used if sizing_model = 'kelly_fraction'

frictions:
  exchange: bybit                 # binance | bybit | okx
                                  # Binance bloque les IPs US (GitHub Actions runners)
                                  # → Bybit ou OKX recommandés
  maker_fee_bps: 1.0              # Bybit USDT perp VIP0 maker
  taker_fee_bps: 6.0              # Bybit USDT perp VIP0 taker

telegram:
  enabled: true
