# crypto-trading-bot configuration
# After 2 wins + 2 losses live, slight bump in sizing.
# - 30% of bankroll per single trade (up from 20%)
# - 5 concurrent positions max
# - Leverage cap 1.5x (up from 1.0x = spot equivalent)
#   Note: 5 positions x 30% = 150% notional total = 1.5x leverage if all 5 fire.
#   In practice it's rare to have 5 simultaneous, so avg leverage stays around 0.4x-0.9x.

strategy:
  pairs:
    # Tier 1 : majors
    - "BTC/USDC:USDC"
    - "ETH/USDC:USDC"
    - "SOL/USDC:USDC"
    # Tier 2 : HL native + L1 mature
    - "HYPE/USDC:USDC"
    - "AVAX/USDC:USDC"
    - "LINK/USDC:USDC"
    # Tier 3 : L2s
    - "ARB/USDC:USDC"
    - "OP/USDC:USDC"
    - "POL/USDC:USDC"

  setup_a:
    setup_atr_extension: 1.0
    rsi_threshold: 40.0
    adx_max: 30.0
    funding_threshold: -0.00001

    limit_extension_atr: 2.5

    stop_atr: 1.5
    target_mode: vwap
    target_pct: 0.01

    limit_validity_hours: 8
    position_max_hours: 48

bankroll:
  initial_capital_usd: 100.0
  risk_per_trade_pct: 0.004
  max_concurrent_positions: 5
  max_leverage: 1.5                # was 1.0, now allows up to 5 positions x 30%

  daily_loss_limit_pct: 0.05
  max_drawdown_pct: 0.20

  sizing_model: fixed
  kelly_fraction: 0.25

frictions:
  exchange: hyperliquid
  maker_fee_bps: 1.44
  taker_fee_bps: 4.32

telegram:
  enabled: true
