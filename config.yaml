# crypto-trading-bot configuration
# Spot-equivalent mode (leverage 1.0x on Hyperliquid Perps)
# - 9 pairs scanned: 3 majors + 6 alts
# - Max 20% of bankroll per single trade
# - Up to 5 concurrent positions
# - Min order $10 (HL exchange limit)

strategy:
  pairs:
    # Tier 1 : majors
    - "BTC/USDC:USDC"
    - "ETH/USDC:USDC"
    - "SOL/USDC:USDC"
    # Tier 2 : HL native + L1 mature
    - "HYPE/USDC:USDC"
    - "AVAX/USDC:USDC"
    - "LINK/USDC:USDC"
    # Tier 3 : L2s
    - "ARB/USDC:USDC"
    - "OP/USDC:USDC"
    - "POL/USDC:USDC"        # if HL still uses MATIC, change to "MATIC/USDC:USDC"

  setup_a:
    setup_atr_extension: 1.0
    rsi_threshold: 40.0
    adx_max: 30.0
    funding_threshold: -0.00001

    limit_extension_atr: 2.5

    stop_atr: 1.5
    target_mode: vwap
    target_pct: 0.01

    limit_validity_hours: 8
    position_max_hours: 48

bankroll:
  initial_capital_usd: 100.0
  risk_per_trade_pct: 0.004        # 0.4% -> ~$20 notional, capped at 20%
  max_concurrent_positions: 5
  max_leverage: 1.0                # spot-equivalent

  daily_loss_limit_pct: 0.05
  max_drawdown_pct: 0.20

  sizing_model: fixed
  kelly_fraction: 0.25

frictions:
  exchange: hyperliquid
  maker_fee_bps: 1.44
  taker_fee_bps: 4.32

telegram:
  enabled: true
