# crypto-trading-bot configuration
# Live test phase, $100 bankroll on Hyperliquid
# Validated params from backtest: 71% win rate, Sharpe 5.4 over 3 months
# Note: small live bankroll requires 2% risk to keep notional > $10 (HL min)

strategy:
  pairs:
    - "BTC/USDC:USDC"
    - "ETH/USDC:USDC"
    - "SOL/USDC:USDC"

  setup_a:
    setup_atr_extension: 1.0
    rsi_threshold: 40.0
    adx_max: 30.0
    funding_threshold: -0.00001

    limit_extension_atr: 2.5

    stop_atr: 1.5
    target_mode: vwap
    target_pct: 0.01

    limit_validity_hours: 8
    position_max_hours: 48

bankroll:
  initial_capital_usd: 100.0
  risk_per_trade_pct: 0.02        # 2% of $100 = $2 max loss per trade
                                  # notional ~= $67 (above HL $10 min)
  max_concurrent_positions: 1     # 1 at a time during validation
  max_leverage: 3.0

  # Circuit breakers - tighter for small live bankroll
  daily_loss_limit_pct: 0.05      # -5% in 24h -> halt 24h ($5)
  max_drawdown_pct: 0.20          # -20% from peak -> halt ($20)

  sizing_model: fixed
  kelly_fraction: 0.25

frictions:
  exchange: hyperliquid
  maker_fee_bps: 1.0
  taker_fee_bps: 3.5

telegram:
  enabled: true
